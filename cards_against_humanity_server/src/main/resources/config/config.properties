# TCP port the server listens on.
server.port=8080

# Maximum number of simultaneous client connections accepted by the server.
server.max_connections=50

# Size of the fixed thread-pool that handles client connections.
# Each connected client is served by one dedicated thread.
server.thread_pool_size=50

# SO_BACKLOG: length of the queue of incoming connections waiting to be accepted by ServerSocket#accept().
server.backlog=50

# Character encoding used for all text-based messages.
server.charset=UTF-8
