<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Cards Against Humanity</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-card">
        <h2>Criar conta</h2>
        <input type="text" id="reg-username" placeholder="Usuário">
        <input type="email" id="reg-email" placeholder="E-mail">
        <input type="password" id="reg-password" placeholder="Senha">
        <button id="register-btn">Cadastrar</button>
        <p>Já tem conta? <a href="login.html">Faça login</a></p>
        <div id="status"></div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
