<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sala de espera — Cards Against Humanity. Aguarde outros jogadores e inicie a partida.">
    <title>Sala de Espera - Cards Against Humanity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="waiting-room">
        <div class="waiting-card" id="waiting-card">

            <!-- Header da sala -->
            <div class="waiting-header">
                <h2>⏳ Sala de Espera</h2>
                <div class="game-code-box">
                    <span class="code-label">Código da sala</span>
                    <div class="code-row">
                        <strong id="game-code-display">---</strong>
                        <button id="copy-code-btn" class="btn-copy" title="Copiar código">📋</button>
                    </div>
                    <span id="copy-toast" class="copy-toast">Copiado!</span>
                </div>
            </div>

            <!-- Contador de jogadores -->
            <div id="players-count" class="players-count">
                <span class="count-label">Jogadores</span>
                <div class="count-display">
                    <span id="current-players">0</span>
                    <span class="count-separator">/</span>
                    <span id="max-players">?</span>
                </div>
            </div>

            <!-- Barra de progresso -->
            <div class="progress-bar-track">
                <div id="progress-bar" class="progress-bar-fill" style="width: 0%"></div>
            </div>

            <!-- Mensagem de status -->
            <div id="waiting-message" class="waiting-message">
                Aguardando pelo menos 3 jogadores para iniciar...
            </div>

            <!-- Lista de jogadores na sala -->
            <div class="players-in-room">
                <h3 class="players-in-room-title">Na sala</h3>
                <ul id="room-players-list" class="room-players-list"></ul>
            </div>

            <!-- Ações -->
            <div class="waiting-actions">
                <button id="start-game-btn" class="btn-primary" disabled>Iniciar Jogo</button>
                <button id="leave-room-btn" class="btn-secondary">Sair da Sala</button>
            </div>

        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/global.js"></script>
    <script src="js/game.js"></script>
    <script src="js/menu.js"></script>
</body>

</html>
