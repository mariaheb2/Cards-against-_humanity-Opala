<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sala de Espera - Cards Against Humanity</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="waiting-room">
        <div class="waiting-card">
            <h2>Sala de Espera</h2>
            <div class="game-code-box">
                Código da sala: <strong id="game-code-display">---</strong>
            </div>
            <div id="players-count" class="players-count">
                Aguardando jogadores: <span id="current-players">0</span> / <span id="max-players">0</span>
            </div>
            <div id="waiting-message" class="waiting-message">
                Aguardando pelo menos 3 jogadores para iniciar...
            </div>
            <div class="waiting-actions">
                <button id="start-game-btn" class="btn-primary" disabled>Iniciar Jogo</button>
                <button id="leave-room-btn" class="btn-secondary">Sair da Sala</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/global.js"></script>
    <script src="js/game.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
